<!DOCTYPE html>

<html>
<head>
<title>Purchase Orders</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="navbar"></div>

<div class="container">

<h1>Purchase Orders</h1>



<!-- CREATE SECTION -->

<div id="createSection">

<div class="grid">

<div class="form-group">
<label>PO Number</label>
<input type="text" id="poNo">
</div>

<div class="form-group">
<label>PO Date</label>
<input type="date" id="poDate">
</div>

<div class="form-group">
<label>Customer</label>
<select id="poCustomer"></select>
</div>

</div>

<h2>Items</h2>

<table>
<thead>
<tr>
<th>SL</th>
<th>Description</th>
<th>Part No</th>
<th>HSN</th>
<th>Qty</th>
<th>Rate</th>
<th></th>
</tr>
</thead>

<tbody id="poItems"></tbody>
</table>

<button class="btn" onclick="addPOItem()">+ Add Item</button>

<br><br>

<button class="btn btn-green" onclick="savePO()">Save Purchase Order</button>

</div>

<!-- VIEW SECTION -->

<div id="viewSection" style="display:none;">

<div style="margin-bottom:15px;">
<button onclick="filterPO('all')">All</button>
<button onclick="filterPO('pending')">Pending</button>
<button onclick="filterPO('completed')">Completed</button>
</div>

<div id="poList"></div>

</div>

</div>

<script src="js/navbar.js"></script>
<script src="js/po.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
